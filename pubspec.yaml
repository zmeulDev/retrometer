name: retrometer
description: "Rally Computer / digital trip-meter for regularity rally."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.2+2

environment:
  sdk: ^3.10.8

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. See which dependencies have newer
# versions available with `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # State management: manual Riverpod (codegen chain is broken against the
  # analyzer version shipped with this Flutter SDK, so providers are written by
  # hand). Freezed is still code-generated for immutable models.
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4

  # Domain: GPS distance/speed, screen wakelock, haptic feedback.
  geolocator: ^13.0.2
  wakelock_plus: ^1.6.1
  vibration: ^3.1.8

  # Reverse geocoding (coords → locality name).
  geocoding: ^4.0.0

  # First-run onboarding flag.
  shared_preferences: ^2.3.2

  # Local database: competitions / stages / per-stage run history. Migrated
  # from a single SharedPreferences JSON blob for queryability + growth.
  sqflite: ^2.4.1
  path: ^1.9.0

  # App metadata (name, package, version, build) for the About screen.
  package_info_plus: ^10.1.0

  # Open the privacy policy URL from the location disclosure dialog.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # End-to-end widget flows run headlessly via `flutter test integration_test/`.
  integration_test:
    sdk: flutter

  # Host-side SQLite factory for unit tests (sqflite uses platform channels,
  # unavailable under `flutter test`; ffi runs in-process on the host).
  sqflite_common_ffi: ^2.3.4

  # Codegen for freezed models.
  build_runner: ^2.4.13
  freezed: ^2.5.7

  # Generates platform launcher icons (Android mipmap, iOS Assets.xcassets,
  # Web favicon, desktop) from a single source PNG. Run via
  # `dart run flutter_launcher_icons` after changing the source logo.
  flutter_launcher_icons: ^0.14.4

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the `flutter_lints`
  # package is activated in the `analysis_options.yaml` file located at the root
  # of your package. See that file for information about deactivating specific
  # lint rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Bundled fonts (offline; no google_fonts at runtime). Digits use Roboto Mono
  # (fixed-width + tabular figures, has `+ - . :`), labels/titles use Saira
  # Stencil One (restomod signature, Latin Extended for RO diacritics), body/UI
  # use Roboto. All three ship under the SIL Open Font License 1.1 — texts in
  # assets/fonts/licenses/ and exposed in the About screen.
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
    - family: SairaStencil
      fonts:
        - asset: assets/fonts/SairaStencilOne-Regular.ttf

  # License texts for the bundled fonts (read by the About → Open-source
  # licenses screen via rootBundle).
  assets:
    - assets/fonts/licenses/

# Generates platform launcher icons from a single source PNG. Run with:
#   dart run flutter_launcher_icons
# The 1024 source is an upscaled copy of assets/retrometer_logo.png kept in
# assets/icons/ so the bundled runtime asset stays the original 500px file.
flutter_launcher_icons:
  image_path: "assets/icons/retrometer_logo_1024.png"
  # The legacy round/adaptive Android icons use the full-bleed logo.
  android: true
  ios: true
  web:
    generate: true
    background_color: "#0B0B0F"
    theme_color: "#0B0B0F"
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
  # Adaptive (Android 13+ themed) icon: same logo on a dark background with
  # safe-zone padding so the launcher mask doesn't crop the mark.
  adaptive_icon_background: "#0B0B0F"
  adaptive_icon_foreground: "assets/icons/retrometer_logo_1024.png"
  remove_alpha_ios: true
  min_sdk_android: 21